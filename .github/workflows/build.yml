name: Build NFC Login System

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-winforms:
    name: Build WinForms App
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore .NET dependencies
      run: dotnet restore NFCLoginSystem/NFCLoginSystem.csproj
    
    - name: Build WinForms Application
      run: dotnet build NFCLoginSystem/NFCLoginSystem.csproj --configuration Release --no-restore
    
    - name: Publish WinForms Application
      run: dotnet publish NFCLoginSystem/NFCLoginSystem.csproj --configuration Release --self-contained --runtime win-x64 --output ./publish/winforms
    
    - name: Upload WinForms Artifact
      uses: actions/upload-artifact@v4
      with:
        name: nfc-login-winforms-artifact
        path: ./publish/winforms

  build-credential-provider:
    name: Build Credential Provider
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2
    
    - name: Build Credential Provider
      run: msbuild WindowsCredentialProvider/NFCCredentialProvider/NFCCredentialProvider.sln /p:Configuration=Release /p:Platform=x64
    
    - name: Upload Credential Provider Artifact
      uses: actions/upload-artifact@v4
      with:
        name: nfc-credential-provider-artifact
        path: WindowsCredentialProvider/NFCCredentialProvider/x64/Release/